name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the GitHub Release
  id-token: write   # NuGet Trusted Publishing (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify tag matches VersionPrefix
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PREFIX=$(grep -oPm1 '(?<=<VersionPrefix>)[^<]+' Directory.Build.props)
          if [ "$VERSION" != "$PREFIX" ]; then
            echo "Tag $GITHUB_REF_NAME does not match VersionPrefix $PREFIX in Directory.Build.props" >&2
            exit 1
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 10.0.x

      - name: Setup Node (widget build)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Build (Release, warnings as errors)
        run: dotnet build BotWire.slnx -c Release

      - name: Test
        run: dotnet test BotWire.slnx -c Release --no-build --filter "Category!=RequiresMailpit"

      - name: Pack
        run: dotnet pack BotWire.slnx -c Release --no-build -o artifacts

      - name: NuGet login (Trusted Publishing, OIDC)
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        id: nuget-login
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Push to NuGet.org
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "$GITHUB_REF_NAME"
          artifacts/*.nupkg artifacts/*.snupkg
          --title "BotWire $GITHUB_REF_NAME"
          --generate-notes
