name: CI

on:
  push:
    branches: [main, feature/phase1-5]
  pull_request:
    branches: [main, feature/phase1-5]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 10.0.x

      - name: Setup Node (widget build)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Widget tests
        run: npm ci && npm test
        working-directory: npm/botwire-js

      - name: Build (Release, warnings as errors)
        run: dotnet build BotWire.slnx -c Release

      - name: Test
        run: dotnet test BotWire.slnx -c Release --no-build --filter "Category!=RequiresMailpit"
