name: CI

on:
  push:
    branches: [main, feature/phase1-5]
  pull_request:
    branches: [main, feature/phase1-5]

# Least privilege: this workflow only builds and tests, so the token needs read-only
# access to the repo contents and nothing else.
permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: 10.0.x

      - name: Setup Node (widget build)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Widget tests
        run: npm ci && npm test
        working-directory: npm/botwire-js

      - name: Build (Release, warnings as errors)
        run: dotnet build BotWire.slnx -c Release

      - name: Test
        run: dotnet test BotWire.slnx -c Release --no-build --filter "Category!=RequiresMailpit"
